# invest-model 配置（截面多因子自主闭环）

# 数据源（仅生产数据更新 mode=update 使用）
sources:
  tushare:
    enabled: true
    retry_times: 3
    retry_delay: 2
    rate_limit_per_min: 480
    timeout: 30            # 单次 HTTP 超时秒数（防请求挂死）
    # 数据服务基地址：使用 minitick.top 镜像（含 VIP 接口，如 fina_indicator_vip）。
    # 也可在 .env 用 TUSHARE_HTTP_URL 覆盖；留空走官方 HTTPS。
    http_url: "https://minitick.top/"

# 数据库（连接信息从 .env 读取；本地验证用 --db sqlite:///./data/local.db 覆盖）
database:
  pool_size: 5
  max_overflow: 10
  echo: false

# 模型/策略默认值（命令行参数优先于此处；见 scripts/run_pipeline.py）
model:
  universe:
    method: alla            # 全 A 流动性筛选
    min_list_days: 365      # 上市满 1 年
    liquidity_pct: 0.20     # 剔除流动性最差 20%
    size_pct: 0.10          # 剔除市值最小 10%
  factors:
    ic_window: 12           # 滚动 IC 窗口（调仓期数）
    ic_mode: icir           # icir | ic
    neutralize: true        # 行业 + 市值中性化
  portfolio:
    top_n: 30
    scheme: rank_weight     # equal | rank_weight | score_weight
    max_weight: 0.08        # 单票上限
    industry_cap: 0.30      # 单行业上限
  timing:
    enabled: true
    floor: 0.5              # 总仓位下限（下限 0.5、线性、不连乘 —— 修复空仓陷阱）
  rebalance: monthly        # monthly | biweekly
  benchmark: "000300.SH"

logging:
  level: INFO
  dir: ./logs
