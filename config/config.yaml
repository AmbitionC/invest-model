# invest-model 配置（截面多因子自主闭环）

# 数据源（仅生产数据更新 mode=update 使用）
sources:
  tushare:
    enabled: true
    retry_times: 3
    retry_delay: 2
    rate_limit_per_min: 140   # 与套餐频率上限对齐（月卡 150次/分钟，留余量）
    timeout: 30            # 单次 HTTP 超时秒数（防请求挂死）
    # 数据服务基地址：以 Action Secret / 环境变量 TUSHARE_HTTP_URL 为准（生产唯一真源）。
    # 这里留空——不再硬编码任何镜像地址，避免 Secret 漏配时悄悄回退到过期镜像。
    # 本地临时跑可在 .env 设 TUSHARE_HTTP_URL；留空且无环境变量则走官方 HTTPS。
    http_url: ""

# 数据库（连接信息从 .env 读取；本地验证用 --db sqlite:///./data/local.db 覆盖）
database:
  pool_size: 5
  max_overflow: 10
  echo: false

# 模型/策略默认值（命令行参数优先于此处；见 scripts/run_pipeline.py）
model:
  universe:
    method: alla            # 全 A 流动性筛选
    min_list_days: 365      # 上市满 1 年
    liquidity_pct: 0.20     # 剔除流动性最差 20%
    size_pct: 0.10          # 剔除市值最小 10%
  factors:
    ic_window: 12           # 滚动 IC 窗口（调仓期数）
    ic_mode: icir           # icir | ic
    neutralize: true        # 行业 + 市值中性化
  portfolio:
    top_n: 30
    scheme: inv_vol         # P4 已晋升默认（波动倒数加权，2026-07-04）| rank_weight | equal | score_weight
    hold_buffer: 1.5        # P4 换手缓冲：已持有且排名在 top_n×1.5 内保留（压换手，0=关）
    max_weight: 0.08        # 单票上限
    industry_cap: 0.30      # 单行业上限
  timing:
    enabled: true
    floor: 0.5              # 总仓位下限（下限 0.5、线性、不连乘 —— 修复空仓陷阱）
  rebalance: monthly        # monthly | biweekly
  benchmark: "000300.SH"

# 套利模块（arbitrage）—— 说明性配置，实际开关以环境变量为准（config-as-strategy）。
# 默认观察态：ARB_ENABLED=0 / ARB_WATERTILT=0。见 invest_model/arb/config.py。
arb:
  enabled: false            # 主开关（环境变量 ARB_ENABLED 覆盖）；0=观察态，计划回退纯引擎B
  watermeter_tilt: false    # 三水表倾斜引擎B（环境变量 ARB_WATERTILT）；影子默认关
  sleeve:                   # 单一资金池分配上下限（Σ≤100% 零杠杆）
    defense: [0.50, 0.60]   # 引擎A 防守 carry
    offense: [0.30, 0.40]   # 引擎B 现有多因子选股（交易）
    alpha:   [0.05, 0.15]   # 盲区α
  strategies:               # 逐策略开关（数据缺失自动降级为现金）
    reverse_repo: true
    dividend: true
    convertible: true
    panic_ammo: true        # 恐慌弹药：fear≥75 把现金→进攻/α
  fear_ammo_trigger: 75     # 恐慌指数触发阈值
  watermeter_promote_periods: 12   # 水表影子IC攒够N期方可晋升

logging:
  level: INFO
  dir: ./logs
