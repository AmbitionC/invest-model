# invest-model 数据层配置（示例）

# 数据源
sources:
  tushare:
    enabled: true
    retry_times: 3
    retry_delay: 2
    rate_limit_per_min: 480
  baostock:
    enabled: true
    retry_times: 3

# 数据库（连接信息从 .env 读取）
database:
  pool_size: 5
  max_overflow: 10
  echo: false

# 采集配置
collection:
  history_years: 5
  batch_size: 50
  daily_update_time: "16:00"

# 数据校验
validation:
  max_pct_chg: 22.0
  min_volume_warn: 100
  max_missing_days: 5
  check_continuity: true

# 日志
logging:
  level: INFO
  dir: ./logs
