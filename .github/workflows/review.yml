name: review

# 复盘引擎：投顾研判/模型因子/持仓 与事后真实收益对账，闭环校准。
# 盘后/周末用。仅读 DB。输出 Markdown 打到日志。
# 触发：改 ops/review.trigger 后 push（仅 master）。

on:
  workflow_dispatch: {}
  push:
    branches: [master]
    paths:
      - 'ops/review.trigger'

concurrency:
  group: review
  cancel-in-progress: false

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      INVEST_DB_URL: ${{ secrets.INVEST_DB_URL }}
      MYSQL_HOST: ${{ secrets.DB_HOST }}
      MYSQL_USER: ${{ secrets.DB_USER }}
      MYSQL_PASSWORD: ${{ secrets.DB_PASS }}
      MYSQL_DATABASE: ${{ vars.INVEST_DB_NAME || 'invest' }}
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package
        run: pip install -e .
      - name: 复盘（投顾/模型/持仓 对账，打印到日志）
        run: |
          python scripts/review.py --out results/review.md
          echo "================ REVIEW MARKDOWN ================"
          cat results/review.md
