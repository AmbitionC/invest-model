name: us-update

# 美股每日：数据更新（yfinance）+ 三层计划生成 + issue 推送。
# 与 A 股 FC 链路完全隔离：跑在 GitHub runner（美国出口，yfinance 可用），
# 只写 us_* 表。cron 22:10 UTC = 美东收盘后（EDT 18:10 / EST 17:10）。
# 手动通道：bump ops/us-invoke.trigger 后 push master（workflow_dispatch 对
# 集成账号可能 403，与 invoke-invest 同一套约定）。

on:
  workflow_dispatch: {}
  schedule:
    - cron: '10 22 * * 1-5'
  push:
    branches: [master]
    paths:
      - 'ops/us-invoke.trigger'
      - '.github/workflows/us-update.yml'

concurrency:
  group: us-update
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  us-daily:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      INVEST_DB_URL: ${{ secrets.INVEST_DB_URL }}
      # 依次回退：专用 PAT → 仓库 GH_TOKEN secret → Actions 内置 token（已授 issues:write）
      GITHUB_TOKEN: ${{ secrets.INVEST_GH_PAT || secrets.GH_TOKEN || github.token }}
      GITHUB_REPOSITORY: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package + yfinance
        run: pip install -e . yfinance
      - name: Run us daily (update + plan + notify)
        run: python scripts/us_daily.py
