name: regime-adaptive-backtest

# 市况自适应策略对照回测（用户命题 2026-07-15·一次性分析）。
# 只读 index_daily；不落库、不改生产。报告打印到日志 + artifact。
on:
  workflow_dispatch: {}
  push:
    branches: [master]
    paths:
      - 'ops/regime-backtest.trigger'

concurrency:
  group: regime-backtest
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      INVEST_DB_URL: ${{ secrets.INVEST_DB_URL }}
      MYSQL_HOST: ${{ secrets.DB_HOST }}
      MYSQL_USER: ${{ secrets.DB_USER }}
      MYSQL_PASSWORD: ${{ secrets.DB_PASS }}
      MYSQL_DATABASE: ${{ vars.INVEST_DB_NAME || 'invest' }}
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package
        run: pip install -e .
      - name: 回测（S1趋势/S2震荡逆向/S3市况自适应·判据预登记）
        run: |
          python scripts/analysis/regime_adaptive_backtest.py \
            --out results/regime_adaptive_backtest.md
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: regime-backtest
          path: results/regime_adaptive_backtest.md
          if-no-files-found: warn
