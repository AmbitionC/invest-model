name: top-feature-check

# 当日持仓·顶部特征体检（确认 P16 自动减半今日是否/对谁触发）。只读、不动仓。
# 触发：手动 / 改 ops/top-feature-check.trigger 后 push（仅 master）。

on:
  workflow_dispatch: {}
  push:
    branches: [master]
    paths:
      - 'ops/top-feature-check.trigger'

concurrency:
  group: top-feature-check
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      INVEST_DB_URL: ${{ secrets.INVEST_DB_URL }}
      MYSQL_HOST: ${{ secrets.DB_HOST }}
      MYSQL_USER: ${{ secrets.DB_USER }}
      MYSQL_PASSWORD: ${{ secrets.DB_PASS }}
      MYSQL_DATABASE: ${{ vars.INVEST_DB_NAME || 'invest' }}
      TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
      TUSHARE_HTTP_URL: ${{ secrets.TUSHARE_HTTP_URL }}
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package
        run: pip install -e .
      - name: 顶部特征体检（当日持仓）
        run: python scripts/analysis/top_feature_check.py --out results/top_feature_check.md
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: top-feature-check
          path: results/top_feature_check.md
          if-no-files-found: warn
