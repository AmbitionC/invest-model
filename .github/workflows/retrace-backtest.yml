name: retrace-rule-backtest

# 回踩买点确认规则对照回测（用户命题 2026-07-15·一次性分析·严谨版）。
# 只读 stock_daily/stock_adj；不落库、不改生产。报告打印到日志 + artifact。
on:
  workflow_dispatch: {}
  push:
    branches: [master]
    paths:
      - 'ops/retrace-backtest.trigger'

concurrency:
  group: retrace-backtest
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      INVEST_DB_URL: ${{ secrets.INVEST_DB_URL }}
      MYSQL_HOST: ${{ secrets.DB_HOST }}
      MYSQL_USER: ${{ secrets.DB_USER }}
      MYSQL_PASSWORD: ${{ secrets.DB_PASS }}
      MYSQL_DATABASE: ${{ vars.INVEST_DB_NAME || 'invest' }}
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package
        run: pip install -e .
      - name: 回测（回踩确认规则 7 变体·补集对照+聚类t+分半期）
        run: |
          python scripts/analysis/retrace_rule_backtest.py \
            --start 20190101 --out results/retrace_rule_backtest.md
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: retrace-backtest
          path: results/retrace_rule_backtest.md
          if-no-files-found: warn
