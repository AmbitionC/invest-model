name: account-value-diag

# 账户市值对账诊断（只读）：current_holding 逐票重算 vs account_snapshot。
on:
  workflow_dispatch: {}
  push:
    branches: [master]
    paths:
      - 'ops/account-diag.trigger'

concurrency:
  group: account-diag
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  diag:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      INVEST_DB_URL: ${{ secrets.INVEST_DB_URL }}
      MYSQL_HOST: ${{ secrets.DB_HOST }}
      MYSQL_USER: ${{ secrets.DB_USER }}
      MYSQL_PASSWORD: ${{ secrets.DB_PASS }}
      MYSQL_DATABASE: ${{ vars.INVEST_DB_NAME || 'invest' }}
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package
        run: pip install -e .
      - name: 对账诊断
        run: python scripts/analysis/account_value_diag.py
