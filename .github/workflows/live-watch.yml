name: live-watch

# 常驻盘中盯盘：单个 job 在交易时段内每 INTERVAL 秒轮询一次 rt_k 实时价，
# 对照库里均线/成本/投顾观察池，只在「新」触发止损/破位/买点时把预警追加到
# 跟踪 issue「📟 盘中盯盘预警」（→ GitHub 邮件提醒），无事静默。
# 均线基准与持仓/观察池全天只取一次并复用；午休/盘前自动暂停，收盘自动退出。
#
# 触发：手动(workflow_dispatch，可传 interval) 或 改 ops/live-watch.trigger 后 push。
# cancel-in-progress：新触发会顶掉旧的常驻 run（改参数/重启用）。
# Secrets 来源与 live-check 一致（INVEST_DB_URL 优先，否则 DB_*；Tushare rt_k 走代理）。

on:
  # ⚠️ 定时触发已迁移至阿里云 FC 定时函数（fe-journey-faas 仓库 s.yaml 里的
  # invest-scheduler / invest-live-watch，代码在本仓库 faas/ 目录）。
  # 迁移原因：Actions 免费额度不足 + schedule 实测延迟 2.8~5.8 小时。
  # 本 workflow 仅保留手动触发作兜底，详见 docs/scheduled_update.md「统一 FaaS 定时调度」。
  workflow_dispatch:
    inputs:
      interval:
        description: "常态轮询间隔秒数（距触发线远近自适应升降频）"
        default: "60"
  push:
    paths:
      - 'ops/live-watch.trigger'

concurrency:
  group: live-watch
  # 排队不打断：新触发（另一档 cron/guard 补拉）在旧 run 健康运行时排队等待，
  # 而不是 cancel 重启——避免无谓打断；旧 run 收盘退出后，排队的 run 启动并因
  # 已过收盘秒退。需要「改参数重启」时：手动 cancel 运行中的 run 再 dispatch。
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  watch:
    # ⛔ 成本开关：常驻盯盘每交易日消耗 ~320 分钟 Actions 额度（免费 2000/月，
    # 约 6 个交易日耗尽）。在 Settings → Variables 设 LIVE_WATCH_ON_ACTIONS=0
    # 即停用本工作流的所有触发（迁移到本地/自托管后使用，见
    # docs/scheduled_update.md「盯盘迁出 GitHub Actions」）。
    if: vars.LIVE_WATCH_ON_ACTIONS != '0'
    runs-on: ubuntu-latest
    # 覆盖整个交易时段（09:30-15:00 约 5.5h）；python 到 15:00 会自动退出，不会空转到超时。
    timeout-minutes: 360
    env:
      INVEST_DB_URL: ${{ secrets.INVEST_DB_URL }}
      MYSQL_HOST: ${{ secrets.DB_HOST }}
      MYSQL_USER: ${{ secrets.DB_USER }}
      MYSQL_PASSWORD: ${{ secrets.DB_PASS }}
      MYSQL_DATABASE: ${{ vars.INVEST_DB_NAME || 'invest' }}
      TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
      TUSHARE_HTTP_URL: ${{ secrets.TUSHARE_HTTP_URL }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      INTERVAL: ${{ inputs.interval || '60' }}
      PYTHONUNBUFFERED: "1"   # 否则 print 被块缓冲，日志要进程退出才可见（被 cancel 则丢失）

      # 预警评论里 @提及谁（触发通知邮件）。默认 @仓库 owner；可在
      # Settings → Variables 配 LIVE_WATCH_MENTION 覆盖（如换个账号/多人）。
      LIVE_WATCH_MENTION: ${{ vars.LIVE_WATCH_MENTION || '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package
        run: pip install -e .
      - name: 常驻盯盘（自适应轮询，风控即推/买点摘要合并推）
        run: |
          python scripts/live_check.py --watch --interval "$INTERVAL" --notify \
            --min-interval 20 --max-interval 180 --digest-window 20 \
            --hard-stop 0.08 --pullback-pct 0.03
