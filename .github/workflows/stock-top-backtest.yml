name: stock-top-detection-backtest

# 个股·顶部识别(C overlay)适用性回测。只读 stock_daily(前复权) + risk 常量；不落库、不改生产。
# 报告打印到日志（Claude 读取）+ 上传 artifact。触发：手动 / 改 ops/stock-top-backtest.trigger 后 push（仅 master）。

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "限制个股数（留空=全池）"
        default: ""
  push:
    branches: [master]
    paths:
      - 'ops/stock-top-backtest.trigger'

concurrency:
  group: stock-top-backtest
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      INVEST_DB_URL: ${{ secrets.INVEST_DB_URL }}
      MYSQL_HOST: ${{ secrets.DB_HOST }}
      MYSQL_USER: ${{ secrets.DB_USER }}
      MYSQL_PASSWORD: ${{ secrets.DB_PASS }}
      MYSQL_DATABASE: ${{ vars.INVEST_DB_NAME || 'invest' }}
      TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
      TUSHARE_HTTP_URL: ${{ secrets.TUSHARE_HTTP_URL }}
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package
        run: pip install -e .
      - name: 回测（个股顶部识别适用性）
        run: |
          python scripts/analysis/stock_top_detection_backtest.py \
            ${{ github.event.inputs.limit && format('--limit {0}', github.event.inputs.limit) || '' }} \
            --out results/stock_top_detection_backtest.md
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: stock-top-backtest
          path: results/stock_top_detection_backtest.md
          if-no-files-found: warn
