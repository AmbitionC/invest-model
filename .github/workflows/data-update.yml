name: 定时数据更新

# 持久化的定时任务：在 GitHub 云端按计划跑 Tushare 增量更新，写入【生产 MySQL】。
# 注意：本仓库的 SQLite real.db 是临时/本地文件，无法作为定时任务的持久目标，
# 因此本工作流通过 INVEST_DB_URL 指向生产 MySQL。
#
# 需在仓库 Settings → Secrets and variables → Actions 配置以下 Secrets：
#   TUSHARE_TOKEN     Tushare token
#   TUSHARE_HTTP_URL  自定义接口基地址（如 https://minitick.top/）
#   INVEST_DB_URL     mysql+pymysql://user:pass@host:3306/dbname
# 且生产 MySQL 需允许 GitHub Actions 运行器访问（放行出口 IP 或用自托管 runner）。

on:
  # 定时已停用：未配 INVEST_DB_URL（生产 MySQL 路径）。本环境改走 SQLite + 按需更新。
  # schedule:
  #   - cron: "0 9 * * 1-5"   # 工作日 17:00 北京：日线增量
  #   - cron: "0 10 * * 6"    # 周六 18:00 北京：全量刷新
  workflow_dispatch:
    inputs:
      mode:
        description: "运行模式"
        type: choice
        options: [update, all]
        default: update

concurrency:
  group: data-update
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: 选择模式
        id: pick
        run: |
          if [ "${{ github.event.schedule }}" = "0 10 * * 6" ]; then
            echo "mode=all" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.inputs.mode }}" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> "$GITHUB_OUTPUT"
          else
            echo "mode=update" >> "$GITHUB_OUTPUT"
          fi
      - name: 运行数据更新
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          TUSHARE_HTTP_URL: ${{ secrets.TUSHARE_HTTP_URL }}
          INVEST_DB_URL: ${{ secrets.INVEST_DB_URL }}
        run: |
          # 回看 40 天起算，缺失日逻辑只补未入库的交易日（幂等）
          START=$(date -u -d '40 days ago' +%Y%m%d)
          echo "mode=${{ steps.pick.outputs.mode }} start=$START"
          python scripts/run_pipeline.py --mode "${{ steps.pick.outputs.mode }}" --start "$START"
