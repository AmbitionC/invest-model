name: dividend-etf-scan

# 老登/红利防御 ETF 趋势与买点位扫描（一次性只读分析）。
# bump ops/dividend-etf-scan.trigger push master 触发；读 tushare 前复权、打日志+artifact，不落库。

on:
  workflow_dispatch: {}
  push:
    branches: [master]
    paths:
      - 'ops/dividend-etf-scan.trigger'

concurrency:
  group: dividend-etf-scan
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
      TUSHARE_HTTP_URL: ${{ secrets.TUSHARE_HTTP_URL }}
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package
        run: pip install -e .
      - name: 老登/红利 ETF 扫描
        run: python scripts/analysis/dividend_etf_scan.py
      - name: 上传扫描结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dividend-etf-scan
          path: results/dividend_etf_scan.md
          if-no-files-found: ignore
