name: build-model

# 只建模（不拉数）：用库里已有行情/估值，直接跑 universe→因子→预测→回测→导出。
# 绕开 backfill 里按天补历史估值的慢步骤（盘中镜像更慢，动辄数小时）。
#
# 云端+RDS 公网下，全市场因子×多年月度调仓极重（2.7 年跑 >60min 超时）。模型定位是
# "给投顾标的当参谋"（质量分位+IC 置信度），不需要超长回测，故窗口收敛到近 ~18 个月
# （start=20250101）即够 IC/近端预测，能稳定跑完。
# 只在 master 触发，避免与其它分支互相抢占取消。

on:
  workflow_dispatch:
    inputs:
      start:
        description: "建模起始日 YYYYMMDD"
        default: "20250101"
  push:
    branches: [master]
    paths:
      - 'ops/build-model.trigger'

concurrency:
  group: build-model
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      INVEST_DB_URL: ${{ secrets.INVEST_DB_URL }}
      MYSQL_HOST: ${{ secrets.DB_HOST }}
      MYSQL_USER: ${{ secrets.DB_USER }}
      MYSQL_PASSWORD: ${{ secrets.DB_PASS }}
      MYSQL_DATABASE: ${{ vars.INVEST_DB_NAME || 'invest' }}
      TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
      TUSHARE_HTTP_URL: ${{ secrets.TUSHARE_HTTP_URL }}
      START: ${{ inputs.start || '20250101' }}
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package
        run: pip install -e .
      - name: 录入投顾信号（reco/theme，容错；供 advisor-led 报告用）
        run: |
          shopt -s nullglob
          for f in config/advisor_research_*.csv config/advisor_signals_*.csv config/advisor_intraday_*.csv; do
            case "$f" in *template*) continue;; esac
            python scripts/ingest_advisor.py --kind reco --csv "$f" || echo "WARN 跳过 $f"
          done
          for f in config/advisor_theme_*.csv config/advisor_themes_*.csv; do
            case "$f" in *template*) continue;; esac
            python scripts/ingest_advisor.py --kind theme --csv "$f" || echo "WARN 跳过 $f"
          done
      - name: 补基准指数（alpha/beta 用；容错，取不到不阻断建模）
        run: |
          python - <<'PY'
          try:
              from invest_model.data import make_engine
              from invest_model.repositories.base import BaseRepository
              from invest_model.sources.tushare_client import TushareClient
              repo = BaseRepository(make_engine()); cli = TushareClient()
              n = 0
              for code in ["000300.SH", "000905.SH", "000906.SH"]:
                  df = cli.get_index_daily(code, "20230101", "20260701")
                  if df is not None and not df.empty:
                      n += repo.upsert("index_daily", df, ["code", "trade_date"])
              print(f"index_daily 补齐：{n} 行")
          except Exception as e:
              print(f"WARN 基准指数补齐跳过：{e}")
          PY
      - name: 建模（universe→因子→预测→回测→导出，只用库内数据）
        run: python scripts/run_pipeline.py --mode all --start "$START"
