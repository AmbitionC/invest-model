name: chinext-cycle-backtest

# 创业板指本轮牛市离场策略对照回测（用户命题·一次性分析）。
# 只读 index_daily + risk.py 生产函数；不落库、不改生产。报告打印到日志（Claude 读取）+ 上传 artifact。
# 触发：手动 / 改 ops/chinext-backtest.trigger 后 push（仅 master）。

on:
  workflow_dispatch:
    inputs:
      code:
        description: "指数代码"
        default: "399006.SZ"
  push:
    branches: [master]
    paths:
      - 'ops/chinext-backtest.trigger'

concurrency:
  group: chinext-backtest
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      INVEST_DB_URL: ${{ secrets.INVEST_DB_URL }}
      MYSQL_HOST: ${{ secrets.DB_HOST }}
      MYSQL_USER: ${{ secrets.DB_USER }}
      MYSQL_PASSWORD: ${{ secrets.DB_PASS }}
      MYSQL_DATABASE: ${{ vars.INVEST_DB_NAME || 'invest' }}
      TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
      TUSHARE_HTTP_URL: ${{ secrets.TUSHARE_HTTP_URL }}
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package
        run: pip install -e .
      - name: 回测（创业板指本轮牛市离场对照）
        run: |
          python scripts/analysis/chinext_cycle_backtest.py \
            --code "${{ github.event.inputs.code || '399006.SZ' }}" \
            --out results/chinext_cycle_backtest.md
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: chinext-backtest
          path: results/chinext_cycle_backtest.md
          if-no-files-found: warn
