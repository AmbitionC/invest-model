name: model-defense-validation

# 模型防御端区分力验证（owner 命题 0718，判据预登记）。只读，不落库。
on:
  workflow_dispatch: {}
  push:
    branches: [master]
    paths:
      - 'ops/model-defense.trigger'

concurrency:
  group: model-defense
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      INVEST_DB_URL: ${{ secrets.INVEST_DB_URL }}
      MYSQL_HOST: ${{ secrets.DB_HOST }}
      MYSQL_USER: ${{ secrets.DB_USER }}
      MYSQL_PASSWORD: ${{ secrets.DB_PASS }}
      MYSQL_DATABASE: ${{ vars.INVEST_DB_NAME || 'invest' }}
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package
        run: pip install -e .
      - name: 防御端验证
        run: |
          python scripts/analysis/model_defense_validation.py \
            --out results/model_defense_validation.md
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: model-defense
          path: results/model_defense_validation.md
          if-no-files-found: warn
