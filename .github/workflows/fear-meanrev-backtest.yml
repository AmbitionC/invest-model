name: fear-meanrev-backtest

# 恐慌极值均值回归择时回测（用户命题·一次性分析）。
# 只读 fear_daily/index_daily/stock_daily（不足则 fear_gauge 逐日重算，无前视）；不落库、不改生产。
# 报告打印到日志（Claude 读取）+ 上传 artifact。触发：手动 / 改 ops/fear-meanrev-backtest.trigger 后 push（仅 master）。

on:
  workflow_dispatch:
    inputs:
      recompute_days:
        description: "fear_daily 不足时用 fear_gauge 重算的目标交易日数"
        default: "900"
  push:
    branches: [master]
    paths:
      - 'ops/fear-meanrev-backtest.trigger'

concurrency:
  group: fear-meanrev-backtest
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      INVEST_DB_URL: ${{ secrets.INVEST_DB_URL }}
      MYSQL_HOST: ${{ secrets.DB_HOST }}
      MYSQL_USER: ${{ secrets.DB_USER }}
      MYSQL_PASSWORD: ${{ secrets.DB_PASS }}
      MYSQL_DATABASE: ${{ vars.INVEST_DB_NAME || 'invest' }}
      TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
      TUSHARE_HTTP_URL: ${{ secrets.TUSHARE_HTTP_URL }}
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package
        run: pip install -e .
      - name: 回测（恐慌极值均值回归择时）
        run: |
          python scripts/analysis/fear_meanrev_backtest.py \
            --recompute-days "${{ github.event.inputs.recompute_days || '900' }}" \
            --out results/fear_meanrev_backtest.md
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: fear-meanrev-backtest
          path: results/fear_meanrev_backtest.md
          if-no-files-found: warn
