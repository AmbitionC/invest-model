name: fear-bucket-backtest

# 恐慌分桶 + 极度恐慌买宽基 回测（用户命题·E17 预登记·一次性只读）。
# 分桶前瞻收益（75-80/80-85/85+）定仓位曲线形状 + 宽基篮子(沪深300/创业板/科创50)择时。
# 只读 fear_daily/index_daily/stock_daily；不落库、不改生产。报告进日志 + artifact。
# 触发：手动 / 改 ops/fear-bucket-backtest.trigger 后 push（仅 master）。

on:
  workflow_dispatch:
    inputs:
      recompute_days:
        description: "fear_daily 不足时用 fear_gauge 重算的目标交易日数"
        default: "900"
  push:
    branches: [master]
    paths:
      - 'ops/fear-bucket-backtest.trigger'

concurrency:
  group: fear-bucket-backtest
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      INVEST_DB_URL: ${{ secrets.INVEST_DB_URL }}
      MYSQL_HOST: ${{ secrets.DB_HOST }}
      MYSQL_USER: ${{ secrets.DB_USER }}
      MYSQL_PASSWORD: ${{ secrets.DB_PASS }}
      MYSQL_DATABASE: ${{ vars.INVEST_DB_NAME || 'invest' }}
      TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
      TUSHARE_HTTP_URL: ${{ secrets.TUSHARE_HTTP_URL }}
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package
        run: pip install -e .
      - name: 回测（恐慌分桶+极度恐慌买宽基）
        run: |
          python scripts/analysis/fear_bucket_backtest.py \
            --recompute-days "${{ github.event.inputs.recompute_days || '900' }}" \
            --out results/fear_bucket_backtest.md
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: fear-bucket-backtest
          path: results/fear_bucket_backtest.md
          if-no-files-found: warn
