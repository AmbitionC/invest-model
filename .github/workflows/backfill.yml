name: backfill

# 首次/全量回填，全程写生产 MySQL：
#   1) 拉历史行情/估值/财务（run_pipeline --mode update）—— 先建 stock_info 等底座
#   2) 录入投顾信号（reco/theme，校验代码命中 stock_info，故必须在 1 之后；容错跳过失败项）
#   3) 构建 universe→因子→IC→预测→回测→导出（run_pipeline --mode all）
#
# 触发：手动(workflow_dispatch) 或 修改 ops/backfill.trigger 后 push。
# Secrets 来源与 data-update 一致（INVEST_DB_URL 优先，否则 DB_*）。

on:
  workflow_dispatch:
    inputs:
      start:
        description: "历史起始日 YYYYMMDD"
        default: "20190101"
  push:
    paths:
      - 'ops/backfill.trigger'

concurrency:
  group: backfill
  cancel-in-progress: true   # 新触发自动抢占取消旧的慢 run

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 350   # 首次全量较重；update 幂等，超时后重跑可续
    env:
      INVEST_DB_URL: ${{ secrets.INVEST_DB_URL }}
      MYSQL_HOST: ${{ secrets.DB_HOST }}
      MYSQL_USER: ${{ secrets.DB_USER }}
      MYSQL_PASSWORD: ${{ secrets.DB_PASS }}
      MYSQL_DATABASE: ${{ vars.INVEST_DB_NAME || 'invest' }}
      TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
      TUSHARE_HTTP_URL: ${{ secrets.TUSHARE_HTTP_URL }}
      START: ${{ inputs.start || '20230101' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package
        run: pip install -e .

      - name: 1) 拉历史数据（建 stock_info 等底座）
        run: python scripts/run_pipeline.py --mode update --start "$START"

      - name: 2) 录入投顾信号（reco/theme，容错）
        run: |
          shopt -s nullglob
          for f in config/advisor_research_*.csv config/advisor_signals_*.csv config/advisor_intraday_*.csv; do
            case "$f" in *template*) continue;; esac
            echo "== reco: $f"
            python scripts/ingest_advisor.py --kind reco --csv "$f" || echo "WARN 跳过 $f"
          done
          for f in config/advisor_theme_*.csv config/advisor_themes_*.csv; do
            case "$f" in *template*) continue;; esac
            echo "== theme: $f"
            python scripts/ingest_advisor.py --kind theme --csv "$f" || echo "WARN 跳过 $f"
          done

      - name: 3) 构建 universe→因子→预测→回测→导出
        run: python scripts/run_pipeline.py --mode all
