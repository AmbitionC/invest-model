name: 每日操作计划

# 交易日盘后生成三段式操作计划（建议买入/持仓风控/观察池），并以 GitHub Issue 评论的
# 形式通知（你会收到 GitHub 邮件）。读取【生产 MySQL】，请确保 data-update 已先跑。
#
# 需配置 Secrets：INVEST_DB_URL（mysql+pymysql://...）
# 可选 Variables：ACCOUNT_CASH（账户现金，折算股数/总权益；默认 0）
#                 PLAN_ARGS（覆盖默认计划参数）
# 持仓与投顾信号需已在 MySQL（用 scripts/migrate_user_data.py 一次性迁入）。

on:
  # 定时已停用：本仓库改用「本环境 SQLite + 会话内按需生成」方案，未配 INVEST_DB_URL。
  # 若日后上生产 MySQL，再取消下面注释启用定时（见 docs/plan_notify.md）。
  # schedule:
  #   - cron: "30 9 * * 1-5"   # 工作日 09:30 UTC ≈ 北京 17:30
  workflow_dispatch:
    inputs:
      cash:
        description: "账户现金（覆盖 ACCOUNT_CASH）"
        required: false

permissions:
  issues: write
  contents: read

concurrency:
  group: plan-notify
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: 生成操作计划
        env:
          INVEST_DB_URL: ${{ secrets.INVEST_DB_URL }}
        run: |
          CASH="${{ github.event.inputs.cash || vars.ACCOUNT_CASH || '0' }}"
          ARGS="${{ vars.PLAN_ARGS || '--advisor-led --risk --trend-filter --concentration medium --time-stop-days 8' }}"
          python scripts/build_action_plan.py $ARGS --cash "$CASH" --out plan.md
      - name: 推送到 GitHub Issue（评论）
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('plan.md', 'utf8');
            const today = new Date().toISOString().slice(0, 10);
            const title = '📈 每日操作计划';
            // 找（或建）一个固定的跟踪 Issue，按天追加评论 → 每天一封邮件
            const found = await github.rest.search.issuesAndPullRequests({
              q: `repo:${context.repo.owner}/${context.repo.repo} is:issue is:open in:title "${title}"`,
            });
            let number;
            if (found.data.total_count > 0) {
              number = found.data.items[0].number;
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body: '本 Issue 用于每日推送操作计划（自动追加评论）。',
              });
              number = created.data.number;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: number,
              body: `## ${today}\n\n${body}`,
            });
