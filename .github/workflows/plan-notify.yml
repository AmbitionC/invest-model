name: plan-notify

# 工作日盘后(约 17:30 北京时间)在生产 MySQL 上生成三段式操作计划，
# 以 GitHub Issue 评论形式追加 → 你会收到 GitHub 邮件提醒。
# 需要在 仓库 Settings → Secrets and variables → Actions 配置：
#   Secrets: INVEST_DB_URL，TUSHARE_TOKEN，TUSHARE_HTTP_URL（同 data-update）
#   Variables(可选): ACCOUNT_CASH=账户现金(如 54089)；PLAN_ARGS=覆盖默认计划参数
# 依赖 data-update 已把当日数据/预测刷进 MySQL。未配 Secrets 前只失败、无副作用。

on:
  # ⚠️ 定时触发已迁移至阿里云 FC 定时函数（fe-journey-faas 仓库 s.yaml 里的
  # invest-scheduler / invest-live-watch，代码在本仓库 faas/ 目录）。
  # 迁移原因：Actions 免费额度不足 + schedule 实测延迟 2.8~5.8 小时。
  # 本 workflow 仅保留手动触发作兜底，详见 docs/scheduled_update.md「统一 FaaS 定时调度」。
  # 主触发：data-update 完成即链式出计划——实测本仓库 schedule 延迟 2.8~5.8h，
  # 两个独立 cron 会叠加两层延迟；链式后只吃 data-update 一层延迟，且天然保证
  # 「先有当日数据、再出计划」的顺序。cron 档保留作兜底（data-update 整档被跳过时）。
  workflow_run:
    workflows: [data-update]
    types: [completed]
  workflow_dispatch: {}
  push:
    branches: [master]
    paths:
      - 'ops/plan-notify.trigger'   # 手动兜底：改此文件即重出当日计划（与其它 workflow 同模式）

concurrency:
  group: plan-notify
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # 链式触发时只在 data-update 成功后出计划（失败的数据不出计划，避免误导）
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    env:
      # 数据库：优先 INVEST_DB_URL；否则回落 DB_*（与 fe-journey-faas 同名，可设 Org secret 共用），
      # 库名固定 invest。详见 data-update.yml 注释。
      INVEST_DB_URL: ${{ secrets.INVEST_DB_URL }}
      MYSQL_HOST: ${{ secrets.DB_HOST }}
      MYSQL_USER: ${{ secrets.DB_USER }}
      MYSQL_PASSWORD: ${{ secrets.DB_PASS }}
      MYSQL_DATABASE: ${{ vars.INVEST_DB_NAME || 'invest' }}
      TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
      TUSHARE_HTTP_URL: ${{ secrets.TUSHARE_HTTP_URL }}
      ACCOUNT_CASH: ${{ vars.ACCOUNT_CASH || '0' }}
      PLAN_ARGS: ${{ vars.PLAN_ARGS || '--advisor-led --risk --trend-filter --concentration medium --time-stop-days 8' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: pip install -e .

      - name: Build action plan
        run: |
          python scripts/build_action_plan.py \
            $PLAN_ARGS --cash "$ACCOUNT_CASH" \
            --out results/action_plan.md

      - name: Post plan to tracking issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const title = '📈 每日操作计划';
            const body = fs.readFileSync('results/action_plan.md', 'utf8');
            const bj = new Date(Date.now() + 8 * 3600 * 1000);
            const today = bj.toISOString().slice(0, 10);   // 北京日期
            // 决策日=计划数据日（首行「# 操作计划 — YYYYMMDD」）；标题/去重都带上它——
            // 跨零点重跑时墙钟日期会撞车（昨日 00:14 的重发占用今日标题，17:00 正式计划被静默去重）
            const planDate = (body.match(/操作计划 — (\d{8})/) || [])[1] || today.replace(/-/g, '');
            const header = `## ${today} 盘后操作计划（决策日 ${planDate}）`;
            if (bj.getUTCDay() === 0 || bj.getUTCDay() === 6) {
              core.info('周末不发计划（周六 data-update 全量刷新的链式触发到此为止）。');
              return;
            }
            const { owner, repo } = context.repo;

            // 找到(或新建)那条追加用的 issue
            const found = await github.rest.search.issuesAndPullRequests({
              q: `repo:${owner}/${repo} is:issue is:open in:title "${title}"`,
            });
            let issue = found.data.items.find(i => i.title === title);
            if (!issue) {
              const created = await github.rest.issues.create({
                owner, repo, title,
                body: '本 issue 由 plan-notify 工作流每个交易日盘后追加操作计划评论。',
              });
              issue = created.data;
            }

            // 防重（2026-07-22 修订·owner 定：当天的信息当天 bump 要当天可见）：
            // ① 决策日 < 今天（盘中 bump 用昨收重算）→ 仍静默跳过——那份不含当日新信号、
            //    且被"盘后"字样误导，是原防重要拦的误导案例；
            // ② 决策日 = 今天 且该决策日已发过 → 不再一刀切跳过：内容有变化（如收盘笔记
            //    在当日计划发出后入库、重算出新提示/新观察池）→ 以「·修订N」追加；
            //    内容与已发一致 → 跳过（防纯重复刷屏，兼防哨兵并发双贴）。
            const existing = await github.rest.issues.listComments({
              owner, repo, issue_number: issue.number, per_page: 50,
              sort: 'created', direction: 'desc',
            });
            const decisionTag = `（决策日 ${planDate}`;   // 不闭括号：兼容「）」与「·修订N）」
            const prior = existing.data.filter(c => (c.body || '').includes(decisionTag));
            let header2 = header;
            if (prior.length) {
              const todayYmd = today.replace(/-/g, '');
              if (planDate !== todayYmd) {
                core.info(`决策日 ${planDate} 的计划已发过且非当日（盘中旧数据重算），跳过。`);
                return;
              }
              const stripHead = s => (s || '').split('\n').slice(1).join('\n').trim();
              const fresh = stripHead(`${header}\n\n${body}`);
              if (prior.some(c => stripHead(c.body) === fresh)) {
                core.info(`决策日 ${planDate} 内容无变化，跳过（防重复）。`);
                return;
              }
              header2 = `## ${today} 盘后操作计划（决策日 ${planDate}·修订${prior.length + 1}）`;
            }
            await github.rest.issues.createComment({
              owner, repo, issue_number: issue.number,
              body: `${header2}\n\n${body}`,
            });
            core.info(`已在 issue #${issue.number} 追加 ${today} 计划评论${prior.length ? '（修订版）' : ''}。`);
