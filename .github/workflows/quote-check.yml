name: quote-check

# 持仓行情体检：查 stock_daily 里每只持仓「更到哪天 + 原始/前复权收盘 + MA20/MA60 + 破位」。
# 只读、不落库、不改生产。报告打印到日志（Claude 读取）。
# 触发：手动 / 改 ops/quote-check.trigger 后 push master。

on:
  workflow_dispatch: {}
  push:
    branches: [master]
    paths:
      - 'ops/quote-check.trigger'

concurrency:
  group: quote-check
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      INVEST_DB_URL: ${{ secrets.INVEST_DB_URL }}
      MYSQL_HOST: ${{ secrets.DB_HOST }}
      MYSQL_USER: ${{ secrets.DB_USER }}
      MYSQL_PASSWORD: ${{ secrets.DB_PASS }}
      MYSQL_DATABASE: ${{ vars.INVEST_DB_NAME || 'invest' }}
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package
        run: pip install -e .
      - name: 持仓行情体检（最新价 + MA20/MA60 + 破位）
        run: python scripts/analysis/quote_check.py
